<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株価シグナル・ダッシュボード</title>
    <style>
        :root { --buy-color: #e74c3c; --sell-color: #3498db; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; background: #f0f2f5; color: #333; }
        
        /* サイドバー */
        #sidebar { width: 280px; height: 100vh; background: #fff; border-right: 1px solid #ddd; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .nav-section { margin-bottom: 30px; }
        .time-item { padding: 12px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; transition: 0.2s; border-left: 4px solid transparent; }
        .time-item:hover { background: #f8f9fa; }
        .time-item.active { background: #eef2ff; border-left-color: #4f46e5; font-weight: bold; }
        select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }

        /* メインコンテンツ */
        #main { flex: 1; padding: 40px; overflow-y: auto; }
        .card-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card.long { border-top: 5px solid var(--buy-color); }
        .card.short { border-top: 5px solid var(--sell-color); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #666; font-size: 0.8rem; padding: 8px; border-bottom: 1px solid #eee; }
        td { padding: 12px 8px; border-bottom: 1px solid #f9f9f9; }
        
        /* リンクの装飾 */
        .code a { font-weight: bold; font-family: monospace; font-size: 1.1rem; color: #4f46e5; text-decoration: none; padding: 4px 8px; background: #f3f4f6; border-radius: 4px; transition: 0.2s; }
        .code a:hover { background: #e0e7ff; color: #3730a3; text-decoration: underline; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; color: #fff; }
        .bg-long { background: var(--buy-color); }
        .bg-short { background: var(--sell-color); }

        @media (max-width: 800px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #ddd; }
            .card-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="nav-section">
        <h3>🔗 証券会社リンク</h3>
        <select id="brokerSelect">
            <option value="rakuten">楽天証券</option>
            <option value="yahoo">Yahoo!ファイナンス</option>
        </select>
    </div>
    <div class="nav-section">
        <h3>📅 日付選択</h3>
        <input type="date" id="datePicker" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
    </div>
    <div class="nav-section">
        <h3>🕒 実行時刻（目次）</h3>
        <div id="timeList"></div>
    </div>
</div>

<div id="main">
    <h2 id="displayTitle">データ取得中...</h2>
    <p id="displayStrategy" style="color: #666; margin-bottom: 20px;">戦略：翌営業日 寄付きエントリー / 大引け決済</p>

    <div class="card-container">
        <div class="card long">
            <h3><span class="badge bg-long">LONG</span> 買い推奨銘柄</h3>
            <table>
                <thead><tr><th>銘柄コード</th><th>セクター</th></tr></thead>
                <tbody id="longTable"></tbody>
            </table>
        </div>

        <div class="card short">
            <h3><span class="badge bg-short">SHORT</span> 空売り推奨銘柄</h3>
            <table>
                <thead><tr><th>銘柄コード</th><th>セクター</th></tr></thead>
                <tbody id="shortTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let allLogs = [];
    let currentLog = null; // 現在表示しているログを記憶

    // 【修正①】キャッシュ対策：URLの後ろに現在の時間をくっつけて、常に最新を取得させる
    const jsonUrl = 'data/logs.json?v=' + new Date().getTime();

    // データの読み込み
    fetch(jsonUrl)
        .then(res => {
            if (!res.ok) throw new Error('Network response was not ok');
            return res.json();
        })
        .then(data => {
            allLogs = data.reverse(); // 新しい順に
            const latest = allLogs[0];
            if(latest) {
                document.getElementById('datePicker').value = latest.date;
                updateTimeList(latest.date);
                renderLog(latest);
            } else {
                document.getElementById('displayTitle').innerText = "まだデータがありません";
            }
        })
        .catch(err => {
            console.error("データの読み込みに失敗しました:", err);
            document.getElementById('displayTitle').innerText = "データの読み込みに失敗しました。";
        });

    // 証券会社が切り替わった時に、画面を再描画する
    document.getElementById('brokerSelect').addEventListener('change', () => {
        if(currentLog) renderLog(currentLog);
    });

    document.getElementById('datePicker').addEventListener('change', (e) => {
        updateTimeList(e.target.value);
    });

    function updateTimeList(date) {
        const filtered = allLogs.filter(l => l.date === date);
        const list = document.getElementById('timeList');
        list.innerHTML = filtered.map(l => `
            <div class="time-item" onclick="renderLogByName('${l.time}')">${l.time}</div>
        `).join('');
    }

    function renderLogByName(timeLabel) {
        const log = allLogs.find(l => l.time === timeLabel);
        if(log) renderLog(log);
    }

    // 選択された証券会社のURLを生成する機能
    function getStockUrl(code) {
        const broker = document.getElementById('brokerSelect').value;
        if (broker === 'rakuten') {
            return `https://www.rakuten-sec.co.jp/web/market/search/quote.html?ric=${code}`;
        } else {
            return `https://finance.yahoo.co.jp/quote/${code}`;
        }
    }

    function renderLog(log) {
        currentLog = log; // 現在のログを記憶
        document.getElementById('displayTitle').innerText = log.time;
        
        // 【修正②】テーブルの描画時に <a> タグを使ってリンクにする
        const renderTable = (data, targetId) => {
            const tbody = document.getElementById(targetId);
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td class="code">
                        <a href="${getStockUrl(item.code)}" target="_blank" rel="noopener noreferrer">
                            ${item.code}
                        </a>
                    </td>
                    <td>${item.name}</td>
                </tr>
            `).join('');
        };

        renderTable(log.long, 'longTable');
        renderTable(log.short, 'shortTable');
    }
</script>

</body>
</html>
